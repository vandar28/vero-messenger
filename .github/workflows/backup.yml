name: Auto Backup Database

on:
  schedule:
    # Каждые 15 минут
    - cron: '*/15 * * * *'
  # Ручной запуск
  workflow_dispatch:
  # При пуше в main
  push:
    branches: [ main ]

jobs:
  backup:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: read
      
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: 🔄 Download database from Render
        run: |
          echo "Скачиваем базу данных с Render..."
          curl -L -o database.sqlite https://vero-messenger.onrender.com/api/backup/download?key=${{ secrets.BACKUP_KEY }}
          
          if [ -f database.sqlite ]; then
            echo "✅ База данных скачана"
            ls -lh database.sqlite
          else
            echo "❌ База данных не скачана"
            exit 0
          fi
      
      - name: 📦 Compress database
        run: |
          echo "Сжимаем базу данных..."
          mkdir -p backups
          gzip -c database.sqlite > backups/latest.sqlite.gz
          echo "✅ База данных сжата"
      
      - name: 🕐 Create timestamped backup
        run: |
          TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
          cp backups/latest.sqlite.gz "backups/backup-${TIMESTAMP}.sqlite.gz"
          echo "✅ Создан бэкап: backup-${TIMESTAMP}.sqlite.gz"
      
      - name: 🗑️ Clean old backups (keep 16)
        run: |
          echo "Очищаем старые бэкапы..."
          cd backups
          ls -t backup-*.sqlite.gz 2>/dev/null | tail -n +17 | xargs -r rm
          echo "✅ Осталось $(ls -1 backup-*.sqlite.gz 2>/dev/null | wc -l) бэкапов"
      
      - name: 📤 Commit and push to GitHub
        run: |
          echo "Отправляем бэкапы в GitHub..."
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -f backups/
          
          if git diff --staged --quiet; then
            echo "ℹ️ Нет изменений для коммита"
            exit 0
          fi
          
          git commit -m "🤖 Auto backup $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push origin main
          
          echo "✅ Бэкапы отправлены в GitHub"
      
      - name: 📊 Show backup info
        run: |
          echo ""
          echo "📊 ИНФОРМАЦИЯ О БЭКАПАХ:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Всего бэкапов: $(ls -1 backups/backup-*.sqlite.gz 2>/dev/null | wc -l)"
          echo "Размер последнего: $(du -h backups/latest.sqlite.gz 2>/dev/null | cut -f1)"
          echo "Самый свежий: $(ls -t backups/backup-*.sqlite.gz 2>/dev/null | head -1 | xargs basename)"
          echo "Самый старый: $(ls -t backups/backup-*.sqlite.gz 2>/dev/null | tail -1 | xargs basename)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"