<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>VERO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root {
  --bg-deep: #0a0e1a;
  --bg-card: #111627;
  --bg-input: #0d1120;
  --bg-hover: #151b2e;
  --border: #1a1f35;
  --border-light: #222840;
  --text: #c8cde0;
  --text-secondary: #8a8ea8;
  --text-muted: #5a5e78;
  --accent: #5270e8;
  --accent-light: #6b84f2;
  --accent-bg: rgba(82,112,232,0.06);
  --red: #e85d5d;
  --red-bg: rgba(232,93,93,0.08);
  --green: #4ecb71;
  --green-bg: rgba(78,203,113,0.08);
  --orange: #f0a040;
  --orange-bg: rgba(240,160,64,0.08);
  --orange-border: rgba(240,160,64,0.2);
  --selected-bg: rgba(82,112,232,0.2);
  --selected-border: #6b84f2;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.2);
}

body{
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  height: 100vh;
  height: 100dvh;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.container{
  max-width:1100px;
  width:100%;
  margin:0 auto;
  padding:8px;
  display:flex;
  flex-direction:column;
  height:100vh;
  height:100dvh;
  overflow:hidden;
}

header{
  background: var(--bg-card);
  padding: 10px 22px;
  border-radius: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  border: 1px solid var(--border);
  flex-shrink: 0;
}

.header-left { display: flex; align-items: center; }
.header-title { color: var(--accent-light); font-size: 20px; font-weight: 700; letter-spacing: -0.02em }

nav{display:flex;align-items:center;gap:12px}
nav span{color:var(--text-secondary);font-size:13px}
nav button{
  color:var(--text-secondary);padding:7px 14px;border-radius:8px;
  cursor:pointer;background:transparent;border:1px solid var(--border);
  font-size:12px;transition:0.2s;font-family:'Inter',sans-serif;
}
nav button:hover{background:var(--bg-hover);color:var(--text)}

.temp-banner{
  background:var(--orange-bg);border:1px solid var(--orange-border);
  padding:8px 16px;border-radius:10px;margin-bottom:8px;
  color:var(--orange);font-size:13px;text-align:center;
  display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;
  flex-shrink:0;
}
.temp-banner .temp-close{
  background:rgba(240,160,64,0.2);color:var(--orange);
  border:1px solid var(--orange-border);padding:6px 14px;
  border-radius:7px;cursor:pointer;font-size:11px;font-weight:600;transition:0.2s;
}
.temp-banner .temp-close:hover{background:rgba(240,160,64,0.35)}

.tabs{
  display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;
  flex-shrink:0;
}
.tab{
  padding:8px 16px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:10px;cursor:pointer;color:var(--text-secondary);
  font-size:13px;transition:0.2s;font-family:'Inter',sans-serif;
}
.tab:hover{border-color:var(--accent);color:var(--text)}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

#tc{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  min-height:0;
}

body.chat-open header,
body.chat-open .temp-banner,
body.chat-open .tabs {
  display: none;
}
body.chat-open .container {
  padding: 0;
}
body.chat-open #tc {
  padding: 0;
  overflow: hidden;
}

.panel{
  background:var(--bg-card);padding:20px;border-radius:14px;
  border:1px solid var(--border);margin-bottom:8px;
}
.panel h2{color:var(--accent);font-size:15px;font-weight:600;margin-bottom:12px}

.upload-area{
  border:2px dashed var(--border);border-radius:12px;
  padding:28px;text-align:center;cursor:pointer;transition:0.2s;
}
.upload-area:hover{border-color:var(--accent);background:var(--accent-bg)}
.upload-area input{display:none}

.btn{
  display:inline-block;padding:8px 16px;background:var(--accent);
  color:#fff;border:none;border-radius:10px;cursor:pointer;
  font-size:11px;font-weight:500;margin:2px;transition:0.2s;
  font-family:'Inter',sans-serif;
}
.btn:hover{background:var(--accent-light)}
.btn-red{background:var(--red-bg);color:var(--red)}.btn-red:hover{background:rgba(232,93,93,0.15)}
.btn-green{background:var(--green-bg);color:var(--green)}.btn-green:hover{background:rgba(78,203,113,0.15)}
.btn-gray{background:var(--bg-input);color:var(--text-secondary)}.btn-gray:hover{background:var(--bg-hover)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:10px}
.file-card{
  background:var(--bg-input);border-radius:10px;overflow:hidden;
  border:1px solid var(--border);cursor:pointer;transition:0.2s;
}
.file-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.file-card img{width:100%;height:130px;object-fit:cover;display:block}
.file-card .info{padding:8px 10px}
.file-card .name{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-secondary)}

.user-list{display:flex;flex-direction:column;gap:6px}
.user-item{
  background:var(--bg-input);padding:10px 14px;border-radius:10px;
  display:flex;justify-content:space-between;align-items:center;
  border:1px solid var(--border);gap:10px;flex-wrap:wrap;
}
.user-item .user-info{display:flex;align-items:center;gap:10px}
.avatar-sm{
  width:36px;height:36px;border-radius:50%;background:var(--bg-card);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  flex-shrink:0;border:2px solid var(--border);cursor:pointer;transition:0.2s;
}
.avatar-sm:hover{border-color:var(--accent-light);transform:scale(1.05)}
.avatar-sm img{width:100%;height:100%;object-fit:cover}
.avatar-sm span{font-size:16px;opacity:0.5}

/* ========== ЧАТ НА ВЕСЬ ЭКРАН ========== */
.chat-fullscreen {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: var(--bg-deep);
  z-index: 50;
  display: flex;
  flex-direction: column;
  padding: 8px;
}

.chat-fullscreen .chat-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--bg-card);
  border-radius: 14px;
  border: 1px solid var(--border);
  overflow: hidden;
}

.chat-fullscreen .chat-header {
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.chat-fullscreen .chat-header h2 {
  flex: 1;
  font-size: 14px;
  color: var(--text);
  margin: 0;
}

/* Поиск в чате */
.chat-search-bar {
  display: none;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.chat-search-bar.active { display: flex; gap: 6px; align-items: center; }
.chat-search-bar input {
  flex: 1;
  padding: 6px 10px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 11px;
  outline: none;
  font-family: 'Inter', sans-serif;
}
.chat-search-bar .search-count { font-size: 10px; color: var(--text-muted); white-space: nowrap; }
.chat-search-bar .search-nav { display: flex; gap: 3px; }
.chat-search-bar .search-nav button {
  background: var(--bg-input);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 4px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 10px;
  font-family: 'Inter', sans-serif;
}
.chat-search-bar .search-nav button:hover { background: var(--bg-hover); }

.chat-container{
  display:flex;
  flex-direction:column;
  flex: 1;
  min-height: 0;
}

.chat-messages{
  flex:1;
  overflow-y:auto;
  padding:8px;
  background:var(--bg-input);
  display:flex;
  flex-direction:column;
  gap:4px;
  scroll-behavior:smooth;
}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.msg{
  max-width:65%;
  padding:5px 8px;
  border-radius:8px;
  font-size:10px;
  word-wrap:break-word;
  line-height:1.3;
  cursor:pointer;
  transition:all 0.15s;
  position:relative;
  scroll-margin-top:20px;
}
.msg.sent{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:2px}
.msg.received{align-self:flex-start;background:var(--bg-hover);color:var(--text);border-bottom-left-radius:2px}
.msg.sticker-msg{background:transparent!important;padding:2px;max-width:130px}
.msg.sticker-msg img{max-width:120px;max-height:120px;border-radius:4px}

/* Подсветка поиска */
.msg.search-highlight {
  background: var(--orange-bg) !important;
  border: 2px solid var(--orange) !important;
  box-shadow: 0 0 12px rgba(240,160,64,0.4);
  z-index: 5;
}
.msg.search-current {
  background: var(--orange) !important;
  color: #fff !important;
  border: 2px solid #fff !important;
  box-shadow: 0 0 16px rgba(240,160,64,0.7);
  z-index: 6;
}
.msg.sent.search-highlight { background: var(--orange-bg) !important; }
.msg.sent.search-current { background: var(--orange) !important; }

.self-destruct-img{
  filter: blur(50px) brightness(0.5);
  transition: none;
  cursor: pointer;
  position: relative;
  user-select: none;
}
.self-destruct-badge{
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.85);
  color: #fff;
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 9px;
  font-weight: 700;
  pointer-events: none;
  z-index: 2;
  white-space: nowrap;
  letter-spacing: 0.5px;
}
.self-destruct-wrapper{
  position: relative;
  display: inline-block;
}

.photo-send-options{
  display: none;
  gap: 4px;
  flex-wrap: wrap;
  margin-top: 4px;
  align-items: center;
}
.photo-send-options.visible{
  display: flex;
}
.photo-send-option{
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 10px;
  font-weight: 600;
  border: 2px solid transparent;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
  white-space: nowrap;
}
.photo-send-option.normal{
  background: var(--accent-bg);
  color: var(--accent-light);
  border-color: var(--accent);
}
.photo-send-option.normal:hover{
  background: rgba(82,112,232,0.2);
}
.photo-send-option.destruct{
  background: var(--orange-bg);
  color: var(--orange);
  border-color: var(--orange-border);
}
.photo-send-option.destruct:hover{
  background: rgba(240,160,64,0.2);
  border-color: var(--orange);
}
.photo-send-option.selected{
  transform: scale(1.05);
  box-shadow: 0 0 12px rgba(0,0,0,0.3);
}
.photo-send-option.normal.selected{
  background: var(--accent);
  color: #fff;
}
.photo-send-option.destruct.selected{
  background: var(--orange);
  color: #fff;
  border-color: var(--orange);
}

.msg-status{display:inline-block;margin-left:3px;font-size:8px;vertical-align:middle}
.msg-status.sent-indicator{opacity:0.5}
.msg-status.read-indicator{color:#4ecb71}

.msg.selected{
  outline:2px solid var(--selected-border);
  outline-offset:2px;
  background:var(--selected-bg)!important;
  box-shadow:0 0 10px rgba(107,132,242,0.3);
  transform:scale(1.02);
  z-index:5;
}

.selected-checkmark{
  position:absolute;
  top:-7px;
  right:-7px;
  width:18px;
  height:18px;
  background:var(--accent-light);
  color:#fff;
  border-radius:50%;
  font-size:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  z-index:6;
  box-shadow:0 2px 6px rgba(0,0,0,0.3);
  pointer-events:none;
}

.msg.highlight{animation:highlightAnim 1.5s ease-out}
@keyframes highlightAnim{0%{box-shadow:0 0 0 4px var(--accent-light);background:var(--selected-bg)}100%{box-shadow:0 0 0 0 transparent;background:transparent}}
.msg .msg-header{display:flex;align-items:center;gap:4px;margin-bottom:1px}
.msg .msg-avatar{width:16px;height:16px;border-radius:50%;overflow:hidden;flex-shrink:0;cursor:pointer}
.msg .msg-avatar img{width:100%;height:100%;object-fit:cover}
.msg .msg-username{font-size:8px;opacity:0.7;font-weight:600}
.msg .time{font-size:7px;opacity:0.5;margin-top:1px;text-align:right}
.msg img.msg-img{max-width:150px;max-height:150px;border-radius:5px;cursor:pointer;display:block;margin:2px 0}

.forward-badge{font-size:7px;opacity:0.7;margin-bottom:1px;font-style:italic}

.msg-reactions{display:flex;gap:1px;margin-top:2px;flex-wrap:wrap}
.reaction-badge{background:rgba(255,255,255,0.08);padding:1px 4px;border-radius:6px;font-size:10px;cursor:pointer;display:flex;align-items:center;gap:1px;transition:0.2s;border:1px solid transparent}
.reaction-badge:hover{background:rgba(255,255,255,0.15)}
.reaction-badge.mine{border-color:var(--accent-light);background:var(--accent-bg)}
.reaction-count{font-size:8px;opacity:0.7}
.msg.sent .reaction-badge{background:rgba(255,255,255,0.12)}.msg.sent .reaction-badge:hover{background:rgba(255,255,255,0.2)}

.reaction-picker{
  display:none;
  position:fixed;
  bottom: 120px;
  left: 50%;
  transform:translateX(-50%);
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:6px 10px;
  gap:4px;
  z-index:100;
  box-shadow:0 4px 20px rgba(0,0,0,0.6);
  flex-wrap:wrap;
  justify-content:center;
}
.reaction-picker.active{display:flex}
.reaction-picker .emoji-btn{font-size:22px;cursor:pointer;padding:4px 6px;border-radius:8px;transition:0.2s;background:none;border:none}
.reaction-picker .emoji-btn:hover{background:var(--bg-hover);transform:scale(1.3)}

.msg-actions-bar{display:none;background:var(--bg-card);padding:8px 10px;border-radius:8px;margin-bottom:6px;gap:6px;align-items:center;flex-wrap:wrap;border:1px solid var(--accent)}
.msg-actions-bar.active{display:flex}
.msg-actions-bar .btn{font-size:10px;padding:5px 10px}

/* ========== ГОЛОСОВЫЕ СООБЩЕНИЯ ========== */
.msg-audio-container {display: flex;align-items: center;gap: 6px;min-width: 150px;max-width: 200px;}
.msg-audio-play {width: 28px;height: 28px;min-width: 28px;border-radius: 50%;background: var(--accent);border: none;color: #fff;font-size: 11px;cursor: pointer;display: flex;align-items: center;justify-content: center;transition: all 0.2s ease;}
.msg-audio-play:hover { transform: scale(1.05); }
.msg-audio-play:active { transform: scale(0.92); }
.msg-audio-play.playing { background: var(--red); }
.msg-audio-wave {flex: 1;height: 22px;display: flex;align-items: center;gap: 1px;cursor: pointer;}
.msg-audio-wave .bar {flex: 1;background: var(--accent-light);border-radius: 1px;transition: all 0.3s ease;min-width: 2px;}
.msg-audio-wave .bar:nth-child(1) { height: 30%; }.msg-audio-wave .bar:nth-child(2) { height: 60%; }.msg-audio-wave .bar:nth-child(3) { height: 45%; }.msg-audio-wave .bar:nth-child(4) { height: 90%; }.msg-audio-wave .bar:nth-child(5) { height: 70%; }.msg-audio-wave .bar:nth-child(6) { height: 35%; }.msg-audio-wave .bar:nth-child(7) { height: 100%; }.msg-audio-wave .bar:nth-child(8) { height: 55%; }.msg-audio-wave .bar:nth-child(9) { height: 80%; }.msg-audio-wave .bar:nth-child(10) { height: 40%; }.msg-audio-wave .bar:nth-child(11) { height: 65%; }.msg-audio-wave .bar:nth-child(12) { height: 50%; }.msg-audio-wave .bar:nth-child(13) { height: 85%; }.msg-audio-wave .bar:nth-child(14) { height: 30%; }.msg-audio-wave .bar:nth-child(15) { height: 75%; }
.msg-audio-duration {font-size: 9px;color: inherit;opacity: 0.7;min-width: 28px;text-align: right;font-weight: 500;}
.msg.sent .msg-audio-wave .bar { background: rgba(255,255,255,0.5); }
.msg.received .msg-audio-wave .bar { background: var(--accent-light); }

/* ========== ВИДЕО СООБЩЕНИЯ ========== */
.msg-video-round-wrapper {position: relative;display: inline-block;cursor: pointer;}
.msg-video-round {width: 110px;height: 110px;border-radius: 50%;object-fit: cover;display: block;margin: 2px 0;border: 2px solid var(--border);transition: all 0.2s ease;background: #000;}
.msg-video-round:hover { border-color: var(--accent); transform: scale(1.02); }
.msg-video-round:active { transform: scale(0.95); }
.msg-video-play-badge {position: absolute;top: 50%;left: 50%;transform: translate(-50%, -50%);width: 30px;height: 30px;border-radius: 50%;background: rgba(0,0,0,0.6);backdrop-filter: blur(4px);color: #fff;font-size: 12px;display: flex;align-items: center;justify-content: center;pointer-events: none;border: 2px solid rgba(255,255,255,0.3);}
.msg-video-duration-badge {position: absolute;bottom: 6px;right: 6px;background: rgba(0,0,0,0.75);backdrop-filter: blur(4px);color: #fff;padding: 2px 5px;border-radius: 3px;font-size: 8px;font-weight: 500;}

.msg .file-box{background:rgba(255,255,255,0.06);padding:5px 7px;border-radius:5px;margin:2px 0;cursor:pointer;display:flex;align-items:center;gap:5px;transition:0.2s;font-size:9px}
.msg .file-box:hover{background:rgba(255,255,255,0.12)}

.chat-input-area{display:flex;gap:4px;align-items:center;flex-wrap:wrap;padding:8px 12px;border-top:1px solid var(--border);flex-shrink:0}
.chat-input-area input[type="text"]{flex:1;min-width:80px;padding:8px 10px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text);outline:none;font-size:11px;transition:0.2s;font-family:'Inter',sans-serif}
.chat-input-area input[type="text"]:focus{border-color:var(--accent)}

.paste-preview{display:none;margin-bottom:4px;padding:8px;background:var(--bg-input);border:1px dashed var(--accent);border-radius:8px}
.paste-preview.active{display:block}
.paste-preview .preview-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.paste-preview .preview-title{color:var(--accent-light);font-size:11px;font-weight:600}
.paste-preview .preview-close{background:var(--red-bg);color:var(--red);border:none;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:10px}
.paste-preview img{max-width:100%;max-height:150px;border-radius:6px;display:block;margin:0 auto}
.paste-preview .file-list{display:flex;flex-wrap:wrap;gap:6px}
.paste-preview .paste-file-item{background:var(--bg-card);padding:6px 10px;border-radius:6px;display:flex;align-items:center;gap:6px;font-size:10px}

.recording-bar{width:100%;padding:6px;background:var(--red-bg);color:var(--red);border-radius:8px;text-align:center;font-weight:600;font-size:11px;display:none;margin-bottom:4px}
.btn-rec{background:var(--red)!important;color:#fff!important;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}

.badge{background:var(--red);color:#fff;padding:2px 6px;border-radius:7px;font-size:10px;margin-left:4px}

.lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.96);z-index:100;align-items:center;justify-content:center}
.lightbox.active{display:flex}
.lightbox img,.lightbox video{max-width:95vw;max-height:90vh;border-radius:8px}
.lightbox-close{position:absolute;top:20px;right:20px;color:#fff;font-size:26px;cursor:pointer;background:none;border:none;opacity:0.7}
.lightbox-close:hover{opacity:1}
.empty{text-align:center;color:var(--text-muted);padding:30px;font-size:13px}

/* ========== МОДАЛЬНОЕ ОКНО НАСТРОЕК ========== */
.modal-overlay {display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;background: rgba(0,0,0,0.8); z-index: 200;align-items: center; justify-content: center;}
.modal-overlay.active { display: flex; }
.modal {background: var(--bg-card); border-radius: var(--radius);border: 1px solid var(--border); width: 100%; max-width: 440px;max-height: 80vh; overflow-y: auto;padding: 24px 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);}
.modal h2 { color: var(--text); font-size: 16px; font-weight: 600; margin-bottom: 16px; text-align: center; }

.modal .current-avatar {width: 100px; height: 100px; border-radius: 50%; object-fit: cover;border: 2px solid var(--accent); cursor: pointer; transition: transform 0.2s;}
.modal .current-avatar:hover { transform: scale(1.05); }
.modal .avatar-history {display: grid;grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));gap: 10px;margin-bottom: 16px;}
.modal .avatar-history-item { position: relative; cursor: pointer; }
.modal .avatar-history-item img {width: 70px; height: 70px; border-radius: 50%; object-fit: cover;border: 2px solid var(--border); transition: all 0.2s;}
.modal .avatar-history-item.active img {border-color: var(--accent);box-shadow: 0 0 12px rgba(82,112,232,0.4);}
.modal .avatar-history-item:hover img {border-color: var(--accent-light);}
.modal .avatar-delete-btn {position: absolute; top: -4px; right: -4px; width: 20px; height: 20px;background: var(--red); color: #fff; border: none; border-radius: 50%;font-size: 10px; cursor: pointer; display: none; align-items: center;justify-content: center; line-height: 1;}
.modal .avatar-history-item:hover .avatar-delete-btn {display: flex;}
.modal .upload-new-btn {width: 100%; padding: 10px; background: var(--accent); color: #fff;border: none; border-radius: var(--radius-xs); font-size: 12px; font-weight: 600;cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; margin-bottom: 16px;}
.modal .upload-new-btn:hover { background: var(--accent-light); }
.modal .close-btn {width: 100%; padding: 10px; background: var(--bg-input); color: var(--text-secondary);border: 1px solid var(--border); border-radius: var(--radius-xs); font-size: 12px;cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif;}
.modal .close-btn:hover { background: var(--bg-hover); }
.modal .empty-history { text-align: center; color: var(--text-muted); font-size: 12px; padding: 20px; }
.modal .section-title { color: var(--text-muted); font-size: 11px; font-weight: 500; letter-spacing: 0.05em; margin-bottom: 10px; }

/* Модалка медиа */
.media-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.media-item { aspect-ratio: 1; border-radius: 8px; overflow: hidden; cursor: pointer; background: var(--bg-input); border: 2px solid var(--border); transition: 0.2s; display: flex; align-items: center; justify-content: center; position: relative; }
.media-item:hover { border-color: var(--accent); transform: scale(1.03); }
.media-item img, .media-item video { width: 100%; height: 100%; object-fit: cover; }
.media-item .file-icon { font-size: 30px; }
.media-item .play-icon { position: absolute; font-size: 24px; pointer-events: none; }
.media-tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
.media-tab { padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 10px; background: var(--bg-input); border: 1px solid var(--border); color: var(--text-secondary); font-family: 'Inter', sans-serif; transition: 0.2s; }
.media-tab:hover { border-color: var(--accent); }
.media-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ========== ПРОСМОТР АВАТАРОК ========== */
.avatar-viewer-overlay {display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;background: rgba(0,0,0,0.9); z-index: 300;flex-direction: column; align-items: center; justify-content: center;}

.avatar-viewer-overlay .viewer-close {position: absolute; top: 20px; right: 20px; color: #fff; font-size: 28px;cursor: pointer; background: none; border: none; opacity: 0.7; z-index: 301;}
.avatar-viewer-overlay .viewer-close:hover { opacity: 1; }
.avatar-viewer-overlay .viewer-main {width: 200px; height: 200px; border-radius: 50%; object-fit: cover;border: 3px solid var(--accent); box-shadow: 0 0 40px rgba(82,112,232,0.3); margin-bottom: 20px;}
.avatar-viewer-overlay .viewer-username { color: #fff; font-size: 16px; font-weight: 600; margin-bottom: 20px; }
.avatar-viewer-overlay .viewer-nav { display: flex; gap: 16px; align-items: center; }
.avatar-viewer-overlay .viewer-nav-btn {width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.1);border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 20px;cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;}

.avatar-viewer-overlay .viewer-dots { display: flex; gap: 6px; }

.pinned-list-item{background:var(--bg-input);padding:12px;border-radius:10px;margin-bottom:8px;cursor:pointer;border:1px solid var(--border);transition:0.2s}

<script>
var T=localStorage.getItem('token'),U=JSON.parse(localStorage.getItem('user')||'{}');
if(!T)location.href='/login.html';
document.getElementById('un').textContent=U.username||'';
var ct=null,ti=null,mediaRecorder=null,pastedFiles=[];
var viewerAvatars=[],viewerIndex=0;
var currentAudio=null,currentAudioBtn=null;
var selectedMessages={},longPressTimer=null;
var activeReactionMsg=null;
var cachedMessages={};
var selfDestructMode=false;
var photoSendMode=null;
var currentDestructMsgId=null;
var reactionTimeout=null;
var stickerPacks=[],currentStickerPack=null;
var isAdmin=false,hasFileAccess=false;
var searchResults=[],searchIndex=0;
var currentMediaTab='all',cachedMedia=[];

var isTemp=localStorage.getItem('is_temp')==='true'||U.is_temp;
if(isTemp){
    document.getElementById('tempBanner').style.display='flex';
    setInterval(function(){fetch('/api/keep-alive',{method:'POST',headers:{Authorization:'Bearer '+T}}).catch(function(){})},30000);
    window.addEventListener('beforeunload',function(){navigator.sendBeacon('/api/delete-temp-account',JSON.stringify({token:T}))});
}

fetch('/stickers/packs.json').then(function(r){return r.json()}).then(function(d){stickerPacks=d.packs||[]}).catch(function(){});

// ===== ОНЛАЙН СТАТУС =====
function updateOnlineStatus() {
    api('/api/user/online', {method:'POST'}).catch(function(){});
}

function updateOfflineStatus() {
    api('/api/user/offline', {method:'POST'}).catch(function(){});
}

updateOnlineStatus();
window.addEventListener('beforeunload', function() { updateOfflineStatus(); });
setInterval(updateOnlineStatus, 30000);

function formatLastSeen(lastSeen) {
    if (!lastSeen) return 'Неизвестно';
    var now = new Date();
    var date = new Date(lastSeen);
    var diff = Math.floor((now - date) / 1000);
    if (diff < 60) return 'только что';
    if (diff < 3600) return Math.floor(diff/60) + ' мин назад';
    if (diff < 86400) return Math.floor(diff/3600) + ' ч назад';
    if (diff < 172800) return 'вчера в ' + date.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
    return Math.floor(diff/86400) + ' дн назад';
}

// ===== СМЕНА ИМЕНИ =====
function changeUsername() {
    var newName = prompt('Введите новое имя пользователя:', U.username);
    if (!newName) return;
    newName = newName.trim();
    if (newName.length < 2) {
        alert('Имя должно содержать минимум 2 символа');
        return;
    }
    
    api('/api/user/change-username', {
        method: 'POST',
        body: { username: newName }
    }).then(function(r){ return r.json() }).then(function(d){
        if (d.ok) {
            U.username = d.user.username;
            localStorage.setItem('user', JSON.stringify(U));
            document.getElementById('un').textContent = U.username;
            alert('✅ Имя изменено на: ' + d.user.username);
            var activeTab = document.querySelector('.tab.active');
            if (activeTab) {
                st(activeTab.dataset.t, activeTab);
            }
        } else if (d.error) {
            alert('❌ ' + d.error);
        }
    }).catch(function(err){
        alert('❌ Ошибка при смене имени');
    });
}

api('/api/check-file-access').then(function(r){return r.json()}).then(function(d){
    isAdmin = d.isAdmin;
    hasFileAccess = d.hasAccess;
    var tabsHtml = '';
    if(hasFileAccess || isAdmin) tabsHtml += '<div class="tab" data-t="files" onclick="st(\'files\',this)">Файлы</div>';
    tabsHtml += '<div class="tab active" data-t="users" onclick="st(\'users\',this)">Пользователи</div>';
    tabsHtml += '<div class="tab" data-t="friends" onclick="st(\'friends\',this)">Друзья<span class="badge" id="rb" style="display:none">0</span></div>';
    tabsHtml += '<div class="tab" data-t="chats" onclick="st(\'chats\',this)">Чаты<span class="badge" id="mb" style="display:none">0</span></div>';
    if(isAdmin) tabsHtml += '<div class="tab" data-t="admin" onclick="st(\'admin\',this)" style="background:var(--orange-bg);color:var(--orange);border-color:var(--orange-border)">⚙️ Админ</div>';
    document.getElementById('tabsContainer').innerHTML = tabsHtml;
    st('users', document.querySelector('#tabsContainer [data-t=users]'));
}).catch(function(){});

function deleteTempAccount(){
    if(!confirm('Удалить?'))return;
    fetch('/api/delete-temp-account',{method:'POST',headers:{Authorization:'Bearer '+T}}).then(function(){localStorage.clear();location.href='/login.html'});
}

document.addEventListener('paste',function(e){
    var inp=document.getElementById('mi');
    if(!inp||document.activeElement!==inp)return;
    var items=e.clipboardData.items;if(!items)return;
    var has=false;
    for(var i=0;i<items.length;i++){
        var item=items[i];
        if(item.type.indexOf('image')!==-1||item.type.indexOf('video')!==-1||item.kind==='file'){
            e.preventDefault();has=true;
            var blob=item.getAsFile();
            pastedFiles.push({file:blob,name:blob.name||('paste_'+Date.now()),type:blob.type,size:blob.size,preview:blob.type.startsWith('image/')?URL.createObjectURL(blob):null});
        }
    }
    if(has)updatePastePreview();
});
function addPastedFile(file){pastedFiles.push({file:file,name:file.name||'file',type:file.type,size:file.size,preview:file.type.startsWith('image/')?URL.createObjectURL(file):null})}
function updatePastePreview(){
    var p=document.getElementById('pastePreview');if(!p)return;
    if(!pastedFiles.length){p.classList.remove('active');hidePhotoSendOptions();return}
    p.classList.add('active');
    var c='';
    pastedFiles.forEach(function(item,i){
        if(item.type.startsWith('image/'))c+='<img src="'+item.preview+'" style="max-height:120px;margin:3px">';
        else c+='<div class="paste-file-item">📄 '+item.name+' <button class="btn btn-red" onclick="removePastedFile('+i+')" style="padding:2px 6px;font-size:9px">✕</button></div>';
    });
    p.innerHTML='<div class="preview-header"><span class="preview-title">📋 '+pastedFiles.length+' файла</span><button class="preview-close" onclick="clearPastedFiles()">✕ Очистить</button></div><div class="file-list">'+c+'</div>';
    checkPhotoSendOptions();
}
function removePastedFile(i){if(pastedFiles[i]&&pastedFiles[i].preview)URL.revokeObjectURL(pastedFiles[i].preview);pastedFiles.splice(i,1);updatePastePreview()}
function clearPastedFiles(){pastedFiles.forEach(function(item){if(item.preview)URL.revokeObjectURL(item.preview)});pastedFiles=[];updatePastePreview()}
function formatSize(b){if(!b)return'0 B';var k=1024,s=['B','KB','MB','GB'],i=Math.floor(Math.log(b)/Math.log(k));return parseFloat((b/Math.pow(k,i)).toFixed(1))+' '+s[i]}
function formatDuration(sec){if(!sec||isNaN(sec))return'0:00';var m=Math.floor(sec/60);var s=Math.floor(sec%60);return m+':'+(s<10?'0':'')+s;}

function checkPhotoSendOptions(){
    var hasPhoto=false;
    for(var i=0;i<pastedFiles.length;i++){if(pastedFiles[i].type.startsWith('image/')){hasPhoto=true;break}}
    var cf=document.getElementById('cf');
    if(!hasPhoto&&cf&&cf.files){for(var i=0;i<cf.files.length;i++){if(cf.files[i].type.startsWith('image/')){hasPhoto=true;break}}}
    if(hasPhoto){showPhotoSendOptions()}else{hidePhotoSendOptions()}
}

function showPhotoSendOptions(){
    var d=document.getElementById('photoSendOptions');if(!d)return;
    d.classList.add('visible');photoSendMode=null;selfDestructMode=false;updatePhotoOptionButtons();
}

function hidePhotoSendOptions(){
    var d=document.getElementById('photoSendOptions');if(!d)return;
    d.classList.remove('visible');photoSendMode=null;selfDestructMode=false;
}

function selectPhotoMode(mode){photoSendMode=mode;selfDestructMode=(mode==='destruct');updatePhotoOptionButtons()}

function updatePhotoOptionButtons(){
    var nb=document.getElementById('photoNormalBtn'),db=document.getElementById('photoDestructBtn');
    if(nb){nb.classList.remove('selected');if(photoSendMode==='normal')nb.classList.add('selected')}

// ========== ПОИСК СООБЩЕНИЙ ==========
function toggleSearch(){
    var bar = document.getElementById('chatSearchBar');
    if(bar.classList.contains('active')){ closeSearch(); } else { bar.classList.add('active'); document.getElementById('searchInput').focus(); }
}
function closeSearch(){
    var bar = document.getElementById('chatSearchBar');
    bar.classList.remove('active');
    document.getElementById('searchInput').value = '';
    searchResults = [];
    searchIndex = 0;
    clearSearchHighlights();
    document.getElementById('searchCount').textContent = '';
}
function doSearch(){
    var query = (document.getElementById('searchInput').value || '').toLowerCase().trim();
    clearSearchHighlights();
    searchResults = [];
    searchIndex = 0;
    if(!query){ document.getElementById('searchCount').textContent = ''; return; }
    var messages = document.querySelectorAll('#cm .msg');
    messages.forEach(function(el){
        var text = (el.textContent || '').toLowerCase();
        if(text.indexOf(query) !== -1){
            searchResults.push(el);
            el.classList.add('search-highlight');
        }
    });
    var count = searchResults.length;
    document.getElementById('searchCount').textContent = count ? (searchIndex + 1) + '/' + count : '0/0';
    if(count > 0){ searchIndex = 0; navigateToSearchResult(); }
}
function navigateToSearchResult(){
    clearSearchCurrent();
    if(!searchResults.length) return;
    var el = searchResults[searchIndex];

function prevSearch(){

function deleteSelected(deleteFor){
    var ids=Object.keys(selectedMessages);
    if(!ids.length)return;
    if(deleteFor==='all'){
        var hasForeign=false;
        for(var j=0;j<ids.length;j++){ if(!selectedMessages[ids[j]].isSent){ hasForeign=true; break; } }
        if(hasForeign){
            if(!confirm('Чужие сообщения нельзя удалить у всех. Они будут удалены только у вас. Продолжить?'))return;
            var k=0;
            function processMixed(){
                if(k>=ids.length){clearSelection();lm(ct.id);return}
                var msgId=ids[k];
                var isSent=selectedMessages[msgId].isSent;
                var deleteForThis=isSent?'all':'me';
                api('/api/messages/'+msgId+'/delete',{ method:'POST', body:{delete_for:deleteForThis} }).then(function(){k++;processMixed()}).catch(function(){k++;processMixed()})
            }
            processMixed();
            return;
        }
    }
    var confirmText=deleteFor==='all'?'удалить у всех':'удалить у себя';
    if(!confirm('Вы уверены что хотите '+confirmText+' '+ids.length+' сообщений?'))return;
    var i=0;
    function nx(){
        if(i>=ids.length){clearSelection();lm(ct.id);return}
        api('/api/messages/'+ids[i]+'/delete',{ method:'POST', body:{delete_for:deleteFor} }).then(function(){i++;nx()}).catch(function(){i++;nx()})
    }
    nx();
}

async function startRec(type) {
    try {
        var constraints = {
            audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true, sampleRate: 48000, channelCount: 1 }
        };
        if (type === 'video') { constraints.video = { facingMode: 'user' }; }
        var stream = await navigator.mediaDevices.getUserMedia(constraints);
        var mimeType = 'audio/webm;codecs=opus';
        if (!MediaRecorder.isTypeSupported(mimeType)) { mimeType = 'audio/webm'; }
        if (!MediaRecorder.isTypeSupported(mimeType)) { mimeType = 'audio/ogg;codecs=opus'; }
        mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType, audioBitsPerSecond: 128000 });
        var chunks = []; var startTime = Date.now();
        mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) chunks.push(e.data); };
        mediaRecorder.onstop = function() {
            stream.getTracks().forEach(function(t) { t.stop(); });
            var blob = new Blob(chunks, { type: mimeType });
            if (blob.size < 1000) { alert('Запись слишком короткая или пустая.'); document.getElementById('recBar').style.display = 'none'; document.getElementById('micBtn').classList.remove('btn-rec'); document.getElementById('vidBtn').classList.remove('btn-rec'); return; }
            var fileName = (type === 'audio' ? 'voice_' : 'video_') + Date.now() + '.webm';
            var file = new File([blob], fileName, { type: mimeType });
            sendFile(ct.id, file);
            document.getElementById('recBar').style.display = 'none';
            document.getElementById('micBtn').classList.remove('btn-rec');
            document.getElementById('vidBtn').classList.remove('btn-rec');
        };
        mediaRecorder.start(100);
        document.getElementById('recBar').style.display = 'block';
        document.getElementById('recBar').innerHTML = '⏺️ Запись... <span id="recTime">0:00</span> <button class="btn" onclick="stopRecording()" style="background:#fff;color:var(--red);margin-left:6px;padding:4px 10px;font-size:10px">Стоп</button>';
        var recTimer = setInterval(function() {
            var elapsed = Math.floor((Date.now() - startTime) / 1000);
            var minutes = Math.floor(elapsed / 60);
            var seconds = elapsed % 60;
            var timeEl = document.getElementById('recTime');
            if (timeEl) { timeEl.textContent = minutes + ':' + (seconds < 10 ? '0' : '') + seconds; }
        }, 1000);
        mediaRecorder._timer = recTimer;
        if (type === 'audio') document.getElementById('micBtn').classList.add('btn-rec');
        else document.getElementById('vidBtn').classList.add('btn-rec');
    } catch(e) { console.error('Ошибка доступа к микрофону:', e); alert('Нет доступа к микрофону.'); }
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        if (mediaRecorder._timer) { clearInterval(mediaRecorder._timer); mediaRecorder._timer = null; }
    }
}

// ========== ВОСПРОИЗВЕДЕНИЕ АУДИО ==========
function playAudio(btn, url) {
    if (currentAudio && currentAudio.src.includes(url) && !currentAudio.paused) { currentAudio.pause(); if (currentAudioBtn) currentAudioBtn.textContent = '▶'; return; }
    if (currentAudio) { currentAudio.pause(); if (currentAudioBtn) currentAudioBtn.textContent = '▶'; }
    var audio = new Audio(url);
    var durationEl = btn.parentElement.querySelector('.msg-audio-duration');
    audio.preload = 'metadata';
    audio.onloadedmetadata = function() {
        if (durationEl) {
            var duration = audio.duration;
            if (!isNaN(duration) && isFinite(duration) && duration > 0) { durationEl.textContent = formatDuration(duration); }
            else { setTimeout(function() { if (durationEl && !isNaN(audio.duration) && isFinite(audio.duration) && audio.duration > 0) { durationEl.textContent = formatDuration(audio.duration); } }, 500); }
        }
    };
    if (audio.readyState >= 1) {
        if (durationEl) { var duration = audio.duration; if (!isNaN(duration) && isFinite(duration) && duration > 0) { durationEl.textContent = formatDuration(duration); } }
    }
    audio.onplay = function() { btn.textContent = '⏸'; btn.classList.add('playing'); };
    audio.onpause = function() { btn.textContent = '▶'; btn.classList.remove('playing'); };
    audio.onended = function() { btn.textContent = '▶'; btn.classList.remove('playing'); };
    audio.onerror = function(e) { console.error('Ошибка аудио:', e); btn.textContent = '▶'; btn.classList.remove('playing'); if (durationEl) { durationEl.textContent = '0:00'; } };
    audio.play().catch(function(err) { console.error('Ошибка воспроизведения:', err); btn.textContent = '▶'; btn.classList.remove('playing'); });
    currentAudio = audio;
    currentAudioBtn = btn;
}

function sendFile(id,file){
    var fd=new FormData(); fd.append('file',file);
    api('/api/messages/'+id,{method:'POST',body:fd}).then(function(){ lm(id); }).catch(function(err){ console.error('Ошибка отправки файла:', err); alert('Ошибка отправки файла.'); });
}

function sm(id){
    var inp=document.getElementById('mi'),fi=document.getElementById('cf');
    var text=inp?inp.value.trim():'',file=fi?fi.files[0]:null;
    if(!text&&!file)return;
    if(file&&file.type.startsWith('image/')&&!photoSendMode){alert('Выберите режим отправки фото: 📷 Обычное или 🔥 Одноразовое');return}
    var fd=new FormData();
    if(file){fd.append('file',file);if(selfDestructMode&&file.type.startsWith('image/')){fd.append('is_self_destruct','true')}}
    if(text)fd.append('message_text',text);
    api('/api/messages/'+id,{method:'POST',body:fd}).then(function(){
        if(inp)inp.value='';if(fi)fi.value='';
        selfDestructMode=false;photoSendMode=null;hidePhotoSendOptions();lm(id);
    });
}

}

function closeAvatarViewer(){document.getElementById('avatarViewer').classList.remove('active');document.body.style.overflow=''}

function prevAvatar(){if(!viewerAvatars.length)return;viewerIndex=(viewerIndex-1+viewerAvatars.length)%viewerAvatars.length;updateViewer()}
function nextAvatar(){if(!viewerAvatars.length)return;viewerIndex=(viewerIndex+1)%viewerAvatars.length;updateViewer()}

function openStickerModal(){
    document.getElementById('stickerModal').classList.add('active');
    document.body.style.overflow='hidden';
    showStickerPacks();
}
function closeStickerModal(){
    document.getElementById('stickerModal').classList.remove('active');
    document.body.style.overflow='';
    currentStickerPack=null;
}
function showStickerPacks(){
    currentStickerPack=null;
    document.getElementById('stickerModalTitle').textContent='😊 Стикеры';
    if(!stickerPacks.length){ document.getElementById('stickerContent').innerHTML='<div class="empty">Стикеры не найдены. Создайте папки в public/stickers/</div>'; return; }
    var html='<div class="sticker-packs-grid">';
    stickerPacks.forEach(function(pack){
        var icon='🟢';
        if(pack.id==='shrek')icon='🟢';
        else if(pack.id==='deadpool')icon='🔴';
        else if(pack.id==='deadpool-marvel')icon='🟡';
        else if(pack.id==='cat')icon='🐱';
        else if(pack.id==='horimiya')icon='🌸';
        html+='<div class="sticker-pack-card" onclick="openStickerPack(\''+pack.id+'\',\''+pack.name+'\')">';
        html+='<div class="pack-icon">'+icon+'</div>';
        html+='<div class="pack-name">'+pack.name+'</div>';
        html+='</div>';
    });
    html+='</div>';
    document.getElementById('stickerContent').innerHTML=html;
}
function openStickerPack(packId,packName){
    currentStickerPack=packId;
    document.getElementById('stickerModalTitle').textContent=packName;
    fetch('/api/stickers/'+packId).then(function(r){return r.json()}).then(function(d){
        var stickers=d.stickers||[];
        var html='<button class="sticker-back-btn" onclick="showStickerPacks()">← Назад к пакам</button>';
        if(!stickers.length){ html+='<div class="empty">Нет стикеров в этом паке</div>'; }
        else { html+='<div class="sticker-grid">'; stickers.forEach(function(s){ html+='<div class="sticker-item" onclick="sendSticker(\'/stickers/'+packId+'/'+s+'\',\''+s+'\')"><img src="/stickers/'+packId+'/'+s+'" loading="lazy" alt=""></div>'; }); html+='</div>'; }
        document.getElementById('stickerContent').innerHTML=html;
    }).catch(function(){ document.getElementById('stickerContent').innerHTML='<button class="sticker-back-btn" onclick="showStickerPacks()">← Назад к пакам</button><div class="empty">Ошибка загрузки</div>'; });
}
function sendSticker(stickerUrl,stickerName){
    if(!ct)return;
    closeStickerModal();
    fetch(stickerUrl).then(function(r){return r.blob()}).then(function(blob){
        var ext=stickerName.split('.').pop()||'png';
        var mime='image/'+(ext==='webp'?'webp':ext==='gif'?'gif':'png');
        var file=new File([blob],'sticker.'+ext,{type:mime});
        var fd=new FormData(); fd.append('file',file,'sticker.'+ext);
        return api('/api/messages/'+ct.id,{method:'POST',body:fd});
    }).then(function(){lm(ct.id)}).catch(function(err){console.error(err)});
}
document.getElementById('stickerModal').addEventListener('click',function(e){if(e.target===this)closeStickerModal()});
